<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sınav Portalı</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
      padding-bottom: 80px;
    }

    .app-shell {
      width: 100%;
      max-width: 860px;
    }

    .menu-container, .quiz-container {
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .menu-btn {
      border: none;
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      cursor: pointer;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
    }

    .menu-btn.locked {
      background: linear-gradient(135deg, #6c757d, #495057);
      cursor: not-allowed;
      order: 999;
      opacity: 0.85;
    }

    .quiz-container {
      display: none;
      position: relative;
      padding-top: 85px;
      min-height: 100vh;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 6px;
      background: #28a745;
      transition: 0.3s;
      width: 0%;
      border-radius: 14px 14px 0 0;
    }

    .main-menu-btn {
      border: none;
      background: none;
      cursor: pointer;
      font-weight: bold;
      font-size: calc(1rem + 4pt);
      color: #333;
      padding: 5px 0;
    }

    .header-info {
      position: absolute;
      top: 15px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding-right: 110px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
      flex: 1;
      flex-wrap: wrap;
    }

    .header-subject {
      font-weight: normal;
      color: #777;
      font-size: 0.95rem;
      line-height: 1.35;
      word-break: break-word;
    }

    .retry-badge {
      display: none;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffe69c;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .question-title {
      margin-top: 0;
      margin-bottom: 16px;
      line-height: 1.45;
      font-size: 1.2rem;
      color: #222;
    }

    .option-btn {
      width: 100%;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 2px solid #e9ecef;
      background: #f8f9fa;
      text-align: left;
      cursor: pointer;
      font-size: 1.05rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
      position: relative;
    }

    .option-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.correct {
      background: #d4edda !important;
      border-color: #28a745 !important;
      color: #155724 !important;
      font-weight: bold;
    }

    .option-btn.wrong {
      background: #f8d7da !important;
      border-color: #dc3545 !important;
      color: #721c24 !important;
      font-weight: bold;
    }

    .tick {
      display: inline-block;
      margin-left: 10px;
      color: #1f9d45;
      font-weight: bold;
      opacity: 0;
      transform: scale(0.4);
    }

    .tick.show {
      animation: popTick 0.45s ease forwards;
    }

    @keyframes popTick {
      0%   { opacity: 0; transform: scale(0.4); }
      60%  { opacity: 1; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }

    .explanation {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: #eaf2f8;
      border-left: 5px solid #2980b9;
      border-radius: 8px;
      line-height: 1.5;
    }

    .nav-controls {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .nav-btn {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .next-btn { background: #007bff; }
    .prev-btn {
      background: #e9ecef;
      color: #dc3545 !important;
      border: 1px solid #ddd;
    }

    .quiz-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      color: #666;
      font-weight: bold;
      font-size: 0.9rem;
      flex-wrap: wrap;
    }

    .disclaimer-box {
      margin-top: 20px;
      padding: 15px;
      background: #fdfdfd;
      border: 1px solid #eee;
      border-radius: 10px;
      color: #888;
      font-size: 0.8rem;
      line-height: 1.4;
      text-align: center;
    }

    .disclaimer-title {
      display: block;
      font-weight: bold;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      font-size: 0.7rem;
    }

    .source-tag {
      position: fixed;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.05);
      color: #777;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: bold;
      z-index: 9999;
    }

    .reset-set-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      background: #ffc107;
      border: none;
      padding: 8px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 5;
    }

    @media (max-width: 480px) {
      .quiz-container {
        padding-top: 110px;
      }

      .header-info {
        top: 12px;
        left: 12px;
        right: 12px;
        padding-right: 104px;
        align-items: flex-start;
      }

      .header-left {
        display: block;
        padding-right: 6px;
      }

      .main-menu-btn {
        display: block;
        font-size: 0.95rem;
        padding: 0;
        margin-bottom: 6px;
      }

      .header-subject {
        display: block;
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.3;
        max-width: 100%;
      }

      .question-title {
        font-size: 1.05rem;
      }

      .option-btn {
        font-size: 1rem;
        padding: 14px;
      }

      .reset-set-btn {
        top: 12px;
        right: 12px;
        font-size: 0.75rem;
        padding: 7px 10px;
      }
    }
  </style>
</head>

      q: "Balıklarda optimum üretim için aşağıdakilerden hangisi gereklidir?   (Balık Besleme)",
      o: ["Açlık", "Stres", "Dengeli beslenme ve uygun ortam", "Düşük oksijen"],
      c: 2,
      e: "Hem beslenme hem çevresel koşullar birlikte optimum olmalıdır."
    },
    {
      q: "Aşağıdakilerden hangisi su kalitesini düşürür?   (Su Kalitesi)",
      o: ["Temizlik", "Aşırı yemleme", "Oksijen", "Fotosentez"],
      c: 1,
      e: "Fazla yem → kirlilik → kalite düşer."
    },
    {
      q: "Balıklarda yemleme sonrası kontrol edilmesi gereken en önemli durum aşağıdakilerden hangisidir?   (Balık Besleme)",
      o: ["Artan yem", "Renk", "Hava", "Işık"],
      c: 0,
      e: "Artan yem varsa fazla yemleme yapılmıştır."
    },
    {
      q: "Aşağıdakilerden hangisi su kalitesini en hızlı bozar?   (Su Kalitesi)",
      o: ["Temizlik", "Aşırı yemleme", "Havalandırma", "Arıtma"],
      c: 1,
      e: "Fazla yem → hızlı kirlilik."
    },
    {
      q: "Aşağıdakilerden hangisi yem maliyetini artırır?   (Balık Besleme)",
      o: ["Dengeli rasyon", "Aşırı protein kullanımı", "Kontrollü yemleme", "Uygun depolama"],
      c: 1,
      e: "Gereğinden fazla protein kullanımı maliyeti artırır."
    },
    {
      q: "Balık yemlerinde kullanılan balık unu aşağıdakilerden hangisini sağlar?   (Balık Besleme)",
      o: ["Su", "Protein", "Vitamin", "Renk"],
      c: 1,
      e: "Balık unu yüksek kaliteli protein kaynağıdır."
    },
    {
      q: "Balıkların su yüzeyinde toplanması aşağıdakilerden hangisini gösterir?   (Su Kalitesi)",
      o: ["Yüksek oksijen", "Düşük oksijen", "Uygun pH", "Temiz su"],
      c: 0,
      e: "Balıklar oksijen için yüzeye çıkar."
    },
    {
      q: "Balıklarda su kalitesinin bozulması aşağıdakilerden hangisine neden olur?   (Balık Besleme)",
      o: ["Büyüme artışı", "Hastalık riski", "Oksijen artışı", "Vitamin artışı"],
      c: 1,
      e: "Kötü su kalitesi hastalıkları artırır."
    },
    {
      q: "Aşağıdakilerden hangisi su kalitesini bozar?   (Su Kalitesi)",
      o: ["Temizlik", "Atık birikimi", "Oksijen", "Fotosentez"],
      c: 1,
      e: "Atıklar suyu kirletir."
    },
    {
      q: "Balık yemlerinde kullanılan mineral maddeler aşağıdakilerden hangisi için gereklidir?   (Balık Besleme)",
      o: ["Enerji üretimi", "Kemik ve iskelet gelişimi", "Su artırımı", "Renk değişimi"],
      c: 1,
      e: "Mineraller özellikle kemik ve iskelet yapısında görev alır."
    },
    {
      q: "Amonyak (NH3) zehirliliğini azaltmak için aşağıdakilerden hangisi yapılmalıdır?   (Su Kalitesi)",
      o: ["pH yükseltilmeli", "Sıcaklık artırılmalı", "pH düşürülmeli", "Yem artırılmalı"],
      c: 2,
      e: "pH düştükçe toksik NH3 azalır."
    },
    {
      q: "Aşağıdakilerden hangisi su kalitesini korur?   (Su Kalitesi)",
      o: ["Temizlik", "Atık", "Kir", "Düzensizlik"],
      c: 0,
      e: "Temizlik kaliteyi korur."
    },
    {
      q: "Aşağıdakilerden hangisi balıklar için stres kaynağıdır?   (Su Kalitesi)",
      o: ["Uygun pH", "Ani sıcaklık değişimi", "Temiz su", "Dengeli oksijen"],
      c: 1,
      e: "Ani değişimler balıkları strese sokar."
    },
    {
      q: "Aşağıdakilerden hangisi balık sağlığını korur?   (Su Kalitesi)",
      o: ["Kirli su", "Uygun su kalitesi", "Aşırı yemleme", "Stres"],
      c: 1,
      e: "Kaliteli su sağlıklı üretim sağlar."
    }
  ];

  document.getElementById("mainTitle").textContent = `${CURRENT_SUBJECT} Deneme Sınavı`;
  document.getElementById("headerSubject").textContent = CURRENT_SUBJECT;
  document.getElementById("sourceTag").textContent = SOURCE_TEXT;
  document.title = CURRENT_SUBJECT;

  if (performance.navigation.type === performance.navigation.TYPE_RELOAD || !sessionStorage.getItem("session_active")) {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith(storagePrefix())) localStorage.removeItem(k);
    });
    sessionStorage.setItem("session_active", "true");
  }

  let currentQuestions = [];
  let currentIndex = 0;
  let solvedIndex = -1;
  let userAnswers = {};
  let currentSetKey = "";
  let stats = { correct: 0, wrong: 0 };

  function storagePrefix() {
    return "exam_" + CURRENT_SUBJECT.replace(/\s+/g, "_") + "_";
  }

  function setStateKey(index) {
    return storagePrefix() + "state_set_" + index;
  }

  function normalizeQuestion(q, originalIndex) {
    return {
      id: q.id || ("q_" + originalIndex + "_" + Math.random().toString(36).slice(2, 8)),
      originalNo: originalIndex + 1,
      q: q.q,
      o: [...q.o],
      c: q.c,
      e: q.e || "",
      isRetry: q.isRetry || false,
      retryFrom: q.retryFrom || null,
      retryCount: q.retryCount || 0,
      answeredCorrectly: q.answeredCorrectly || false
    };
  }

  function initMenu() {
    const menuGrid = document.getElementById("menuGrid");
    menuGrid.innerHTML = "";

    const totalSets = Math.ceil(questions.length / QUESTIONS_PER_SET);

    let setsPerButton = 1;
    let buttonCount = totalSets;

    if (buttonCount > 10) {
      setsPerButton = 2;
      buttonCount = Math.ceil(totalSets / setsPerButton);
    }

    buttonCount = Math.min(buttonCount, 10);

    for (let i = 0; i < buttonCount; i++) {
      const startSetNo = i * setsPerButton + 1;
      const endSetNo = Math.min(startSetNo + setsPerButton - 1, totalSets);

      const start = (startSetNo - 1) * QUESTIONS_PER_SET;
      const end = Math.min(endSetNo * QUESTIONS_PER_SET, questions.length);

      if (start >= questions.length) continue;

      const key = setStateKey(i);

      const saved = JSON.parse(localStorage.getItem(key) || "null");
      const solved = saved ? Object.keys(saved.userAnswers || {}).length : 0;
      const correct = saved?.stats?.correct || 0;
      const wrong = saved?.stats?.wrong || 0;

      const totalCurrent = saved?.currentQuestions?.length || (end - start);
      const isCompleted = saved ? (solved >= totalCurrent && totalCurrent > 0) : false;

      const label = startSetNo === endSetNo
        ? `Deneme-${startSetNo}`
        : `Deneme-${startSetNo}-${endSetNo}`;

      const btn = document.createElement("button");
      btn.className = `menu-btn ${isCompleted ? "locked" : ""}`;
      btn.innerHTML = `
        <strong>${label}</strong><br>
        <small>${end - start} Soru | Çözülen ${solved} (Doğru ${correct} Yanlış ${wrong})</small>
      `;

      if (!isCompleted) {
        btn.onclick = () => startSet(i, key, start, end);
      }

      menuGrid.appendChild(btn);
    }
  }

  function startSet(idx, key, start, end) {
    currentSetKey = key;

    const saved = JSON.parse(localStorage.getItem(key) || "null");

    if (saved) {
      currentQuestions = saved.currentQuestions;
      currentIndex = saved.currentIndex;
      solvedIndex = saved.solvedIndex;
      userAnswers = saved.userAnswers || {};
      stats = saved.stats || { correct: 0, wrong: 0 };
    } else {
      currentQuestions = questions.slice(start, end).map((q, i) => normalizeQuestion(q, start + i));
      currentIndex = 0;
      solvedIndex = -1;
      userAnswers = {};
      stats = { correct: 0, wrong: 0 };
      saveState();
    }

    document.getElementById("menuContainer").style.display = "none";
    document.getElementById("quizContainer").style.display = "block";
    document.getElementById("headerSubject").textContent = CURRENT_SUBJECT;
    loadQuestion();
    window.scrollTo(0, 0);
  }

  function getQuestionTitle(q) {
    return `Soru-${q.originalNo}: ${q.q}`;
  }

  function loadQuestion() {
    const q = currentQuestions[currentIndex];
    const progress = ((currentIndex + 1) / currentQuestions.length) * 100;

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("footerLeft").textContent = `Kalan: ${Math.max(currentQuestions.length - (currentIndex + 1), 0)}`;
    document.getElementById("footerRight").textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
    document.getElementById("questionText").textContent = getQuestionTitle(q);

    const retryBadge = document.getElementById("retryBadge");
    retryBadge.style.display = q.isRetry ? "block" : "none";

    const optArea = document.getElementById("optionsArea");
    const expArea = document.getElementById("explanationArea");
    optArea.innerHTML = "";
    expArea.style.display = "none";
    expArea.innerHTML = "";

    const letters = ["A", "B", "C", "D"];

    q.o.forEach((opt, idx) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<strong>${letters[idx]})</strong> ${opt}`;

      if (currentIndex <= solvedIndex) {
        btn.disabled = true;
        const userChoice = userAnswers[currentIndex];

        if (idx === userChoice) {
          if (userChoice === q.c) {
            btn.classList.add("correct");
            btn.innerHTML += ` <span class="tick show">✔</span>`;
          } else {
            btn.classList.add("wrong");
          }
        }

        if (userChoice === q.c) {
          expArea.innerHTML = `<strong>Açıklama:</strong> ${q.e}`;
          expArea.style.display = "block";
        } else if (q.isRetry) {
          if (idx === q.c) {
            btn.classList.add("correct");
            btn.innerHTML += ` <span class="tick show">✔</span>`;
          }
          expArea.innerHTML = `<strong>Açıklama:</strong> ${q.e}`;
          expArea.style.display = "block";
        }
      } else {
        btn.onclick = () => selectOption(idx);
      }

      optArea.appendChild(btn);
    });

    document.getElementById("prevBtn").style.visibility = currentIndex > 0 ? "visible" : "hidden";
    document.getElementById("nextBtn").style.visibility = currentIndex <= solvedIndex ? "visible" : "hidden";
  }

  function selectOption(idx) {
    const q = currentQuestions[currentIndex];
    const isCorrect = idx === q.c;

    userAnswers[currentIndex] = idx;
    solvedIndex = Math.max(solvedIndex, currentIndex);

    if (isCorrect) {
      stats.correct++;
      q.answeredCorrectly = true;
    } else {
      stats.wrong++;

      if (!q.isRetry) {
        const retryQuestion = {
          ...q,
          isRetry: true,
          retryFrom: q.originalNo,
          retryCount: 1
        };

        const insertIndex = Math.min(currentIndex + 6, currentQuestions.length);
        currentQuestions.splice(insertIndex, 0, retryQuestion);
      }
    }

    saveState();
    loadQuestion();
  }

  function saveState() {
    localStorage.setItem(currentSetKey, JSON.stringify({
      currentQuestions,
      currentIndex,
      solvedIndex,
      userAnswers,
      stats
    }));
  }

  function goForward() {
    if (currentIndex < solvedIndex) {
      currentIndex = solvedIndex + 1;
    } else if (currentIndex < currentQuestions.length - 1) {
      currentIndex++;
    } else {
      return showMenu();
    }

    saveState();
    loadQuestion();
    window.scrollTo(0, 0);
  }

  function goBack() {
    if (currentIndex > 0) {
      currentIndex--;
      saveState();
      loadQuestion();
      window.scrollTo(0, 0);
    }
  }

  function showMenu() {
    document.getElementById("quizContainer").style.display = "none";
    document.getElementById("menuContainer").style.display = "block";
    initMenu();
    window.scrollTo(0, 0);
  }

  function clearAllStatistics() {
    if (confirm("Tüm veriler sıfırlansın mı?")) {
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith(storagePrefix())) localStorage.removeItem(k);
      });
      initMenu();
    }
  }

  function resetCurrentSet() {
    if (confirm("Bu deneme sıfırlansın mı?")) {
      localStorage.removeItem(currentSetKey);
      showMenu();
    }
  }

  initMenu();
</script>
